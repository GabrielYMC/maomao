<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛毛先生</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2; --cream2: #F3EDE3; --cream3: #EDE4D7;
    --warm-brown: #8C6A4E; --warm-brown-light: #B8906F;
    --text-primary: #3D2E22; --text-secondary: #7A6251; --text-muted: #A8937F;
    --accent-coral: #E07B5A; --accent-sage: #7A9E7E; --accent-dusty: #C4849A; --accent-gold: #C49A3C;
    --border: rgba(140,106,78,0.15); --shadow: 0 2px 16px rgba(61,46,34,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--text-primary); min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 260px; flex-shrink: 0; background: var(--cream2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .logo-icon { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#E07B5A,#C49A3C); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-name { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; }
  .logo-sub { font-size: 12px; color: var(--text-muted); margin-left: 46px; }
  .sidebar-section { padding: 16px 20px 8px; }
  .sidebar-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: background 0.15s; margin-bottom: 2px; }
  .nav-item:hover, .nav-item.active { background: var(--cream3); color: var(--warm-brown); font-weight: 500; }
  .nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .mood-card { margin: 12px 16px; background: white; border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
  .mood-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .mood-emojis { display: flex; justify-content: space-between; }
  .mood-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid transparent; background: var(--cream2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .mood-btn:hover { border-color: var(--warm-brown-light); }
  .mood-btn.selected { border-color: var(--accent-coral); background: #FFF0EB; }
  .streak-card { margin: 0 16px 16px; background: linear-gradient(135deg,#FFF5EE,#FFF0E8); border-radius: 12px; padding: 12px 14px; border: 1px solid rgba(224,123,90,0.2); }
  .streak-num { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; color: var(--accent-coral); line-height: 1; }
  .streak-text { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .dashboard { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .dash-header { margin-bottom: 20px; }
  .dash-date { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .dash-greeting { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .stat-card { background: white; border-radius: 14px; padding: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .stat-num { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .coral .stat-num { color: var(--accent-coral); }
  .sage .stat-num { color: var(--accent-sage); }
  .gold .stat-num { color: var(--accent-gold); }
  .card { background: white; border-radius: 14px; padding: 18px 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .add-btn { font-size: 11px; color: var(--warm-brown); background: var(--cream2); border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: background 0.15s; }
  .add-btn:hover { background: var(--cream3); }

  /* TASKS */
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: white; }
  .task-check:hover { border-color: var(--accent-sage); }
  .task-check.done { background: var(--accent-sage); border-color: var(--accent-sage); }
  .task-check.done::after { content: '✓'; color: white; font-size: 10px; }
  .task-text { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
  .task-text.done { color: var(--text-muted); text-decoration: line-through; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .task-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
  .tag-high { background: #FFF0EB; color: var(--accent-coral); }
  .tag-mid { background: #FFF8E6; color: var(--accent-gold); }
  .tag-low { background: #EEF5EF; color: var(--accent-sage); }
  .task-due { font-size: 11px; color: var(--text-muted); }

  /* GOALS */
  .goal-item { margin-bottom: 14px; }
  .goal-item:last-child { margin-bottom: 0; }
  .goal-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .goal-name { font-size: 13px; font-weight: 500; }
  .goal-pct { font-size: 12px; color: var(--text-muted); }
  .goal-bar-bg { height: 6px; background: var(--cream2); border-radius: 3px; overflow: hidden; }
  .goal-bar { height: 100%; border-radius: 3px; }
  .goal-tag { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  /* CHAT */
  .chat-area { height: 300px; flex-shrink: 0; border-top: 1px solid var(--border); display: flex; flex-direction: column; background: #fff9f4; }
  .chat-header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: white; }
  .chat-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#E07B5A,#C49A3C); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .chat-name { font-size: 13px; font-weight: 500; }
  .chat-status { font-size: 11px; color: var(--accent-sage); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; gap: 8px; max-width: 80%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-av { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg,#E07B5A,#C49A3C); display: flex; align-items: center; justify-content: center; font-size: 12px; margin-top: 2px; }
  .msg-av.u { background: var(--cream3); font-size: 11px; color: var(--warm-brown); font-weight: 500; }
  .msg-bubble { padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.6; }
  .msg-bubble.mao { background: white; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-bubble.user { background: linear-gradient(135deg,#F5E6DB,#EDD9C8); border-bottom-right-radius: 4px; }
  .chat-input-row { padding: 10px 16px; display: flex; gap: 8px; background: white; border-top: 1px solid var(--border); }
  .chat-input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--text-primary); outline: none; }
  .chat-input:focus { border-color: var(--warm-brown-light); }
  .send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: linear-gradient(135deg,#E07B5A,#C49A3C); color: white; cursor: pointer; font-size: 14px; flex-shrink: 0; }
  .send-btn:hover { opacity: 0.85; }

  /* SYNC */
  .sync-bar { display: flex; align-items: center; gap: 8px; padding: 6px 20px; background: var(--cream2); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-sage); }
  .sync-dot.syncing { background: var(--accent-gold); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--accent-coral); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(61,46,34,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: white; border-radius: 16px; padding: 24px; width: 360px; box-shadow: 0 8px 32px rgba(61,46,34,0.15); }
  .modal h3 { font-family: 'Noto Serif TC', serif; font-size: 16px; margin-bottom: 16px; }
  .modal input, .modal select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; margin-bottom: 10px; background: var(--cream); color: var(--text-primary); outline: none; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .btn-cancel { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
  .btn-confirm { padding: 7px 16px; border-radius: 8px; border: none; background: linear-gradient(135deg,#E07B5A,#C49A3C); color: white; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }

  .loading { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .typing { display: flex; gap: 3px; align-items: center; padding: 4px 0; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--cream3); border-radius: 2px; }
</style>
</head>

<script>
  // ★ 第一步：把下面兩行換成你自己的
  const SHEET_ID  = '1nlK1pNgflOw-n-xLjFiInMcig33W7C8BJCbxr1BttJc';   // 例如：1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms
  const API_KEY   = 'AIzaSyABv8pl87khHg1eW511aULyrZC1TfH2D4A';    // 例如：AIzaSyXXXXXXXXXXXXXXXXXXXXX
  // ==========================================

  const BASE = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

  // 讀取某個分頁
  async function sheetGet(range) {
    const url = `${BASE}/${encodeURIComponent(range)}?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.text();
      console.error('sheetGet error:', err);
      throw new Error(err);
    }
    const data = await res.json();
    return data.values || [];
  }

  // 寫入某個分頁（append 新增一列）
  async function sheetAppend(sheet, row) {
    const url = `${BASE}/${encodeURIComponent(sheet + '!A1')}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS&key=${API_KEY}`;
    const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [row] })
      }
    );
    if (!res.ok) {
      const err = await res.text();
      console.error('sheetAppend error:', err);
      throw new Error(err);
    }
    return res.json();
  }

  // 工具：產生簡易 ID
  function genId() { return Date.now().toString(36); }
  // 工具：今天日期字串
  function today() { return new Date().toISOString().split('T')[0]; }
</script>

<script>
  // ── DATE ──
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('date-display').textContent =
    `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日　星期${days[d.getDay()]}`;

  // ── SYNC STATUS ──
  function setSyncStatus(state, msg) {
    const dot = document.getElementById('sync-dot');
    const txt = document.getElementById('sync-status');
    dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
    txt.textContent = msg;
  }

  // ── LOAD TASKS ──
  async function loadTasks() {
    try {
      const rows = await sheetGet('Tasks!A2:G');
      const list = document.getElementById('task-list');
      if (!rows.length) { list.innerHTML = '<div class="loading">還沒有任務，新增一個吧！</div>'; return; }
      list.innerHTML = '';
      let done = 0;
      rows.forEach(r => {
        const [id, title, status, priority, due] = r;
        const isDone = status === '完成';
        if (isDone) done++;
        const item = document.createElement('div');
        item.className = 'task-item fade-in';
        const tagClass = priority === '高' ? 'tag-high' : priority === '低' ? 'tag-low' : 'tag-mid';
        item.innerHTML = `
          <div class="task-check ${isDone?'done':''}" onclick="toggleTask(this,'${id}')"></div>
          <div>
            <div class="task-text ${isDone?'done':''}">${title||''}</div>
            <div class="task-meta">
              <span class="task-tag ${tagClass}">${priority||'中'}</span>
              ${due ? `<span class="task-due">${due}</span>` : ''}
            </div>
          </div>`;
        list.appendChild(item);
      });
      const total = rows.length;
      const remaining = total - done;
      document.getElementById('stat-tasks').textContent = total;
      document.getElementById('stat-tasks-sub').textContent =
        remaining > 0 ? `還有 ${remaining} 項未完成` : '全部完成了 🎉';
    } catch(e) {
      console.error('loadTasks failed:', e);
      document.getElementById('task-list').innerHTML = `<div class="loading" style="color:var(--accent-coral)">讀取失敗：${e.message}<br><small>請按 F12 查看 Console 取得詳細錯誤</small></div>`;
      setSyncStatus('error', '連線失敗，請按 F12 查看錯誤');
    }
  }

  // ── LOAD GOALS ──
  async function loadGoals() {
    try {
      const rows = await sheetGet('Goals!A2:G');
      const list = document.getElementById('goal-list');
      if (!rows.length) { list.innerHTML = '<div class="loading">還沒有目標，新增一個吧！</div>'; return; }
      list.innerHTML = '';
      document.getElementById('stat-goals').textContent = rows.length;
      const colors = ['var(--accent-coral)','var(--accent-gold)','var(--accent-sage)','var(--accent-dusty)'];
      rows.forEach((r, i) => {
        const [id, title, category, progress, deadline] = r;
        const pct = parseInt(progress) || 0;
        const item = document.createElement('div');
        item.className = 'goal-item fade-in';
        item.innerHTML = `
          <div class="goal-header">
            <div class="goal-name">${title||''}</div>
            <div class="goal-pct">${pct}%</div>
          </div>
          <div class="goal-bar-bg"><div class="goal-bar" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div>
          <div class="goal-tag">${category||''} ${deadline ? '· ' + deadline : ''}</div>`;
        list.appendChild(item);
      });
    } catch(e) { /* 已在 loadTasks 顯示錯誤 */ }
  }

  // ── LOAD MOOD ──
  async function loadMoodCount() {
    try {
      const rows = await sheetGet('MoodLog!A2:E');
      const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
      const count = rows.filter(r => r[0] && new Date(r[0]) >= weekAgo).length;
      document.getElementById('stat-mood').textContent = count;
    } catch(e) {}
  }

  // ── INIT LOAD ──
  async function initLoad() {
    setSyncStatus('syncing', '同步 Google Sheets 中…');
    await Promise.all([loadTasks(), loadGoals(), loadMoodCount()]);
    setSyncStatus('ok', '已與 Google Sheets 同步');
    appendMsg('mao', '資料讀取完成！今天有什麼想搞定的嗎？😊');
  }

  // ── TOGGLE TASK (視覺用，實際狀態更新需 Apps Script 或手動) ──
  function toggleTask(el, id) {
    el.classList.toggle('done');
    const txt = el.nextElementSibling.querySelector('.task-text');
    txt.classList.toggle('done');
    const done = document.querySelectorAll('.task-check.done').length;
    const total = document.querySelectorAll('.task-item').length;
    document.getElementById('stat-tasks-sub').textContent =
      (total-done) > 0 ? `還有 ${total-done} 項未完成` : '全部完成了 🎉';
    appendMsg('mao', el.classList.contains('done') ? '完成一項，繼續加油 💪' : '好，已取消完成狀態。');
  }

  // ── MOOD SELECT ──
  async function selectMood(el) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    const score = el.dataset.score;
    const emojis = ['','😔','😕','😐','🙂','😄'];
    setSyncStatus('syncing', '儲存心情中…');
    try {
      await sheetAppend('MoodLog', [today(), score, emojis[score], '', '']);
      setSyncStatus('ok', '心情已儲存到 Sheets ✓');
      appendMsg('mao', score >= 4 ? '心情不錯呢！今天繼續保持 😊' : '有什麼讓你不開心的嗎？可以說說看。');
    } catch(e) {
      setSyncStatus('error', '儲存失敗');
    }
  }

  // ── ADD TASK MODAL ──
  function openAddTask() { document.getElementById('modal-task').style.display='flex'; }
  function closeModal(id) { document.getElementById(id).style.display='none'; }

  async function confirmAddTask() {
    const title = document.getElementById('t-title').value.trim();
    if (!title) { alert('請填入任務名稱'); return; }
    const priority = document.getElementById('t-priority').value;
    const due = document.getElementById('t-due').value;
    const notes = document.getElementById('t-notes').value;
    closeModal('modal-task');
    setSyncStatus('syncing', '新增任務到 Sheets…');
    try {
      await sheetAppend('Tasks', [genId(), title, '待辦', priority, due, notes, today()]);
      setSyncStatus('ok', '任務已新增 ✓');
      await loadTasks();
      appendMsg('mao', `好，「${title}」已記下來了！加油 💪`);
    } catch(e) {
      setSyncStatus('error', '新增失敗，請確認設定');
    }
  }

  // ── ADD GOAL MODAL ──
  function openAddGoal() { document.getElementById('modal-goal').style.display='flex'; }

  async function confirmAddGoal() {
    const title = document.getElementById('g-title').value.trim();
    if (!title) { alert('請填入目標名稱'); return; }
    const category = document.getElementById('g-category').value;
    const deadline = document.getElementById('g-deadline').value;
    closeModal('modal-goal');
    setSyncStatus('syncing', '新增目標到 Sheets…');
    try {
      await sheetAppend('Goals', [genId(), title, category, '0', deadline, today(), today()]);
      setSyncStatus('ok', '目標已新增 ✓');
      await loadGoals();
      appendMsg('mao', `「${title}」這個目標很棒！我們一起追蹤進度 🎯`);
    } catch(e) {
      setSyncStatus('error', '新增失敗，請確認設定');
    }
  }

  // ── CHAT ──
  const chatHistory = [];
  let enterCount = 0;
  let enterTimer = null;
  let isWaiting = false;

  const SYSTEM_PROMPT = `你是毛毛先生，佳穎的溫暖生活小助理。個性活潑開朗、有溫度，偶爾帶點輕鬆幽默。
說話規則：
- 簡潔不囉嗦，說重點
- 主動關心但不過度干涉
- 鼓勵要具體，不說空洞的加油話
- 情緒低落時先傾聽，再視情況給建議
- 不用敬語，像朋友說話
- 回覆用繁體中文
- 遇到醫療或健康問題，可以提供公開資訊整理後的建議，像聰明朋友一樣`;

  function appendMsg(role, text) {
    const c = document.getElementById('chat-messages');
    const el = document.createElement('div');
    el.className = `msg fade-in${role==='user'?' user':''}`;
    el.innerHTML = role === 'mao'
      ? `<div class="msg-av">🐾</div><div class="msg-bubble mao">${text}</div>`
      : `<div class="msg-av u">佳</div><div class="msg-bubble user">${text}</div>`;
    c.appendChild(el);
    c.scrollTop = c.scrollHeight;
  }

  function showTyping() {
    const c = document.getElementById('chat-messages');
    const el = document.createElement('div');
    el.className = 'msg fade-in'; el.id = 'typing-indicator';
    el.innerHTML = `<div class="msg-av">🐾</div><div class="msg-bubble mao"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    c.appendChild(el); c.scrollTop = c.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendChat() {
    if (isWaiting) return;
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    appendMsg('user', text);
    input.value = '';
    chatHistory.push({ role: 'user', content: text });
    isWaiting = true;
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: chatHistory
        })
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text || '').join('') || '（毛毛先生暫時沒有回應）';
      removeTyping();
      appendMsg('mao', reply);
      chatHistory.push({ role: 'assistant', content: reply });
    } catch(e) {
      removeTyping();
      appendMsg('mao', '連線好像有點問題，稍後再試試看？');
    }
    isWaiting = false;
  }

  // 雙 Enter 送出邏輯
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('chat-input');
    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      enterCount++;
      if (enterCount === 1) {
        // 第一下 Enter：在輸入框插入換行
        const pos = input.selectionStart;
        input.value = input.value.slice(0, pos) + '\n' + input.value.slice(pos);
        input.selectionStart = input.selectionEnd = pos + 1;
        // 1.5 秒內沒有第二下，重置計數
        clearTimeout(enterTimer);
        enterTimer = setTimeout(() => { enterCount = 0; }, 1500);
      } else if (enterCount >= 2) {
        // 第二下 Enter：送出
        clearTimeout(enterTimer);
        enterCount = 0;
        // 清掉最後一個換行再送
        input.value = input.value.replace(/\n$/, '');
        sendChat();
      }
    });
  });

  // ── START ──
  window.addEventListener('load', initLoad);
</script>
</body>
</html>
